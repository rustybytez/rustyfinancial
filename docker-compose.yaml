services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-/data/rustyfinancial.db}
      - PORT=${PORT:-8080}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  db-data:
