{{ define "layout" }}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — RustyFinancial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <link rel="stylesheet" href="/static/css/output.css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold mb-4">RustyFinancial</h2>
            {{ if .Error }}
            <div class="alert alert-error mb-4">{{ .Error }}</div>
            {{ end }}
            <form method="POST" action="/login">
                <div class="form-control">
                    <label class="label"><span class="label-text">Access Token</span></label>
                    <input type="password" name="token" class="input input-bordered" required autofocus />
                </div>
                <div class="card-actions justify-end mt-6">
                    <button type="submit" class="btn btn-primary w-full">Sign In</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
{{ end }}
